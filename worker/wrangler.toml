name = "renitizer-analysis"
main = "src/index.js"
compatibility_date = "2026-07-18"

# Shared Renvoy identity for remote jobs and hosted sharing. Configure the
# deployed Renvoy endpoint as a Worker secret, not as a browser value:
#   wrangler secret put RENVOY_IDENTITY_VERIFICATION_URL
# The endpoint is POST /v1/identity/renitizer/verify on the Renvoy runtime.

# Durable processing-job deployment prerequisites. Keep these disabled until
# the real private R2 bucket and Queue have been provisioned. `POST
# /api/jobs/upload` returns processing-unconfigured until both bindings exist.
#
# Create the resources first, then replace only the placeholder names below.
# Do not put credentials, account IDs, or deploy-specific IDs in this file.
#
# [[r2_buckets]]
# binding = "MEDIA_BUCKET"
# bucket_name = "your-private-media-bucket"
#
# [[queues.producers]]
# binding = "JOBS_QUEUE"
# queue = "your-processing-jobs-queue"
#
# [[queues.consumers]]
# queue = "your-processing-jobs-queue"
# max_batch_size = 1
# max_batch_timeout = 5
# max_retries = 3
# dead_letter_queue = "your-processing-jobs-dead-letter-queue"
